<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>🌿 Juniper</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0f1117;color:#e8e8e8;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh}
  .app{max-width:600px;margin:0 auto;padding:20px 16px 100px}
  .header{text-align:center;padding:24px 0 20px;border-bottom:1px solid #1e2130;margin-bottom:20px}
  .header h1{font-size:28px;color:#a8e6cf;font-weight:600}
  .header p{font-size:13px;color:#555;margin-top:4px}
  .tabs{display:flex;gap:4px;background:#1a1d27;border-radius:12px;padding:4px;margin-bottom:20px}
  .tab{flex:1;padding:10px 4px;border:none;background:transparent;color:#666;font-size:13px;font-weight:500;cursor:pointer;border-radius:9px;transition:all .15s}
  .tab.active{background:#2d6a4f;color:#fff}
  .mic-card{background:#1a1d27;border:1px solid #1e2130;border-radius:16px;padding:24px;margin-bottom:20px;text-align:center}
  .mic-btn{width:80px;height:80px;border-radius:50%;border:none;cursor:pointer;font-size:32px;margin:0 auto 16px;display:flex;align-items:center;justify-content:center;transition:all .2s}
  .mic-off{background:#1e2130}
  .mic-on{background:#2d6a4f;animation:pulse 2s infinite}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(45,106,79,.5)}50%{box-shadow:0 0 0 16px rgba(45,106,79,0)}}
  .mic-status{font-size:14px;color:#888;margin-bottom:8px}
  .live-text{font-size:13px;color:#a8e6cf;min-height:40px;padding:8px 16px;background:#0f1117;border-radius:8px;font-style:italic}
  .toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#2d6a4f;color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;font-weight:500;z-index:100;opacity:0;transition:opacity .3s;pointer-events:none}
  .toast.show{opacity:1}
  .section{display:flex;flex-direction:column;gap:10px}
  .card{background:#1a1d27;border:1px solid #1e2130;border-radius:12px;padding:16px}
  .card-row{display:flex;gap:10px;align-items:flex-start}
  .card-title{font-size:15px;font-weight:500;color:#e8e8e8;margin-bottom:4px}
  .card-title.done{text-decoration:line-through;color:#555}
  .card-meta{font-size:12px;color:#555;margin-top:6px;display:flex;flex-wrap:wrap;gap:8px}
  .badge{padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500}
  .p1{background:#3d1515;color:#ff6b6b}
  .p2{background:#2d2a15;color:#ffd93d}
  .p3{background:#152d1e;color:#6bcb77}
  .check-btn{width:24px;height:24px;border-radius:50%;border:2px solid #2d6a4f;background:transparent;cursor:pointer;color:#2d6a4f;font-size:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;transition:all .15s}
  .check-btn:hover{background:#2d6a4f;color:#fff}
  .del-btn{width:28px;height:28px;border:none;background:transparent;cursor:pointer;color:#333;font-size:16px;flex-shrink:0;border-radius:6px;transition:all .15s;display:flex;align-items:center;justify-content:center}
  .del-btn:hover{background:#2a1515;color:#ff6b6b}
  .empty{text-align:center;padding:48px 24px;color:#444;font-size:14px}
  .empty-icon{font-size:36px;margin-bottom:12px}
  .settings-card{background:#1a1d27;border:1px solid #1e2130;border-radius:12px;padding:20px;margin-bottom:12px}
  .settings-card h3{font-size:14px;font-weight:600;color:#a8e6cf;margin-bottom:12px}
  .input{width:100%;padding:10px 12px;background:#0f1117;border:1px solid #1e2130;border-radius:8px;color:#e8e8e8;font-size:14px;outline:none}
  .input:focus{border-color:#2d6a4f}
  .btn{padding:10px 20px;border:none;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;transition:all .15s;width:100%;margin-top:8px}
  .btn-green{background:#2d6a4f;color:#fff}
  .btn-green:hover{background:#1b4332}
  .label{font-size:12px;color:#666;margin-bottom:6px;margin-top:12px;display:block}
  .status{display:flex;align-items:center;gap:6px;font-size:13px;color:#666;margin-top:8px}
  .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
  .dot-green{background:#2d6a4f}
  .dot-red{background:#8b1a1a}
  .dot-yellow{background:#8b6914}
  .section-label{font-size:11px;color:#333;font-weight:500;text-transform:uppercase;letter-spacing:.05em;margin:8px 0 4px}
  .info-box{background:#0d1f2d;border:1px solid #1a3a5c;border-radius:8px;padding:12px;font-size:13px;color:#7ab3d4;line-height:1.6;margin-bottom:12px}
</style>
</head>
<body>
<div class="app" id="app"></div>
<div class="toast" id="toast"></div>

<script>
// ── Config ──────────────────────────────────────────────────────────────────
let BACKEND = localStorage.getItem('juniper_backend') || '';
let NTFY_TOPIC = localStorage.getItem('juniper_ntfy') || '';

// ── Storage helpers (everything in localStorage) ────────────────────────────
const store = {
  get: k => { try { return JSON.parse(localStorage.getItem(k)) } catch { return null } },
  set: (k,v) => localStorage.setItem(k, JSON.stringify(v)),
  todos: () => store.get('juniper_todos') || [],
  events: () => store.get('juniper_events') || [],
  saveTodos: v => store.set('juniper_todos', v),
  saveEvents: v => store.set('juniper_events', v),
};

// ── State ────────────────────────────────────────────────────────────────────
let tab = 'listen';
let listening = false;
let liveText = '';
let lastAction = '';
let backendStatus = 'checking';
let context = [];
let recognition = null;
let restartTimer = null;

// ── Toast ─────────────────────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// ── Check backend ─────────────────────────────────────────────────────────────
async function checkBackend() {
  if (!BACKEND) { backendStatus = 'not set'; render(); return; }
  try {
    const r = await fetch(BACKEND + '/health', {signal: AbortSignal.timeout(5000)});
    backendStatus = r.ok ? 'online' : 'error';
  } catch { backendStatus = 'offline'; }
  render();
}

// ── Send to Juniper AI ────────────────────────────────────────────────────────
async function sendToJuniper() {
  if (!BACKEND || context.filter(c=>c.type==='audio').length < 2) return;
  try {
    const r = await fetch(BACKEND + '/process', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({context: context.slice(-20)})
    });
    const result = await r.json();
    if (result.action === 'none' || !result.action) return;

    const now = new Date().toISOString();
    const id = Date.now();

    if (result.action === 'event' || result.action === 'both') {
      if (result.event) {
        const events = store.events();
        events.unshift({id, ...result.event, reminders: result.reminders||[], created_at: now});
        store.saveEvents(events);
        showToast('📅 Event added: ' + result.event.title);
        scheduleReminders(result.event, result.reminders||[], id);
      }
    }
    if (result.action === 'todo' || result.action === 'both') {
      if (result.todo) {
        const todos = store.todos();
        todos.unshift({id: id+1, ...result.todo, done: false, created_at: now});
        store.saveTodos(todos);
        showToast('✅ Todo added: ' + result.todo.title);
      }
    }
    render();
  } catch(e) { console.warn('Juniper error:', e); }
}

// ── Reminders via ntfy ────────────────────────────────────────────────────────
function scheduleReminders(event, reminders, eventId) {
  if (!NTFY_TOPIC || !event.event_time) return;
  const eventDt = new Date(event.event_time).getTime();
  reminders.forEach(r => {
    const fireAt = eventDt - (r.offset_min * 60 * 1000);
    const delay = fireAt - Date.now();
    if (delay > 0) {
      setTimeout(async () => {
        try {
          await fetch('https://ntfy.sh/' + NTFY_TOPIC, {
            method: 'POST',
            body: r.message,
            headers: {'Title': '⏰ ' + event.title, 'Priority': 'high', 'Tags': 'alarm_clock'}
          });
        } catch(e) { console.warn('ntfy error:', e); }
      }, delay);
    }
  });
}

// ── Reschedule reminders on load ──────────────────────────────────────────────
function rescheduleAll() {
  store.events().forEach(e => {
    if (e.reminders && e.event_time) scheduleReminders(e, e.reminders, e.id);
  });
}

// ── Mic ───────────────────────────────────────────────────────────────────────
function startMic() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { alert('Use Chrome or Edge for mic support'); return; }
  listening = true;
  render();

  function go() {
    if (!listening) return;
    const r = new SR();
    recognition = r;
    r.continuous = true;
    r.interimResults = true;
    r.lang = 'en-US';

    r.onresult = e => {
      let interim = '', final = '';
      for (let i = e.resultIndex; i < e.results.length; i++) {
        const t = e.results[i][0].transcript;
        if (e.results[i].isFinal) final += t;
        else interim += t;
      }
      liveText = interim || final;
      render();
      if (final.trim()) {
        context.push({type:'audio', source:'browser_mic', content:final.trim(), timestamp: new Date().toISOString()});
        if (context.length > 60) context.shift();
        lastAction = 'Heard: "' + final.trim().slice(0,60) + '"';
        sendToJuniper();
        liveText = '';
        render();
      }
    };
    r.onerror = e => { if (e.error !== 'no-speech') console.warn(e.error); };
    r.onend = () => { if (listening) restartTimer = setTimeout(go, 300); };
    r.start();
  }
  go();
}

function stopMic() {
  listening = false;
  liveText = '';
  clearTimeout(restartTimer);
  if (recognition) recognition.stop();
  render();
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function fmtDate(iso) {
  if (!iso) return '';
  return new Date(iso).toLocaleString('en-CA', {weekday:'short', month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'});
}
function pBadge(p) {
  return {1:['p1','🔴 High'], 2:['p2','🟡 Med'], 3:['p3','🟢 Low']}[p] || ['p2','Med'];
}

// ── Actions ───────────────────────────────────────────────────────────────────
function doneTodo(id) {
  const todos = store.todos().map(t => t.id===id ? {...t, done:true} : t);
  store.saveTodos(todos);
  render();
}
function deleteTodo(id) {
  store.saveTodos(store.todos().filter(t => t.id!==id));
  render();
}
function deleteEvent(id) {
  store.saveEvents(store.events().filter(e => e.id!==id));
  render();
}
function saveSettings() {
  BACKEND = document.getElementById('be').value.trim().replace(/\/$/,'');
  NTFY_TOPIC = document.getElementById('nt').value.trim();
  localStorage.setItem('juniper_backend', BACKEND);
  localStorage.setItem('juniper_ntfy', NTFY_TOPIC);
  showToast('Settings saved!');
  checkBackend();
}

// ── Render ────────────────────────────────────────────────────────────────────
function render() {
  const todos = store.todos();
  const events = store.events();
  const active = todos.filter(t=>!t.done);
  const done = todos.filter(t=>t.done);

  const tabLabels = [
    ['listen','🎙 Listen'],
    ['todos', '✅ Todos' + (active.length ? ` (${active.length})` : '')],
    ['events','📅 Events' + (events.length ? ` (${events.length})` : '')],
    ['settings','⚙️ Setup']
  ];

  const statusColor = backendStatus==='online' ? 'dot-green' : backendStatus==='checking' ? 'dot-yellow' : 'dot-red';

  let content = '';

  if (tab === 'listen') {
    content = `
      <div class="mic-card">
        <button class="mic-btn ${listening?'mic-on':'mic-off'}" onclick="${listening?'stopMic':'startMic'}()">
          ${listening?'🎙':'🎤'}
        </button>
        <div class="mic-status">${listening ? '🟢 Juniper is listening...' : '⚫ Tap to start listening'}</div>
        <div class="live-text">${liveText || lastAction || (listening ? 'Waiting for speech...' : 'Press the mic button above')}</div>
      </div>
      ${backendStatus !== 'online' ? `<div class="info-box">⚠️ Backend not connected — go to Setup tab and enter your Render URL.</div>` : ''}
      <div class="section-label">Your data is stored privately on this device only</div>
    `;
  }

  if (tab === 'todos') {
    content = active.length === 0 && done.length === 0
      ? `<div class="empty"><div class="empty-icon">✅</div>No todos yet.<br>Juniper adds them when it hears you commit to something.</div>`
      : `<div class="section">
          ${active.map(t => {
            const [cls,lbl] = pBadge(t.priority);
            return `<div class="card-row">
              <button class="check-btn" onclick="doneTodo(${t.id})"></button>
              <div class="card" style="flex:1">
                <div class="card-title">${t.title}</div>
                ${t.notes ? `<div style="font-size:13px;color:#666;margin-top:4px">${t.notes}</div>` : ''}
                <div class="card-meta"><span class="badge ${cls}">${lbl}</span><span>${fmtDate(t.created_at)}</span></div>
              </div>
              <button class="del-btn" onclick="deleteTodo(${t.id})">✕</button>
            </div>`;
          }).join('')}
          ${done.length > 0 ? `<div class="section-label" style="margin-top:8px">Completed</div>
          ${done.map(t => `<div class="card-row">
            <button class="check-btn" onclick="doneTodo(${t.id})">✓</button>
            <div class="card" style="flex:1;opacity:.4"><div class="card-title done">${t.title}</div></div>
            <button class="del-btn" onclick="deleteTodo(${t.id})">✕</button>
          </div>`).join('')}` : ''}
        </div>`;
  }

  if (tab === 'events') {
    content = events.length === 0
      ? `<div class="empty"><div class="empty-icon">📅</div>No events yet.<br>Juniper creates them when it hears you agree to an appointment.</div>`
      : `<div class="section">${events.map(e => `
          <div class="card-row">
            <div class="card" style="flex:1">
              <div class="card-title">📅 ${e.title}</div>
              ${e.location ? `<div style="font-size:13px;color:#666;margin-top:4px">📍 ${e.location}</div>` : ''}
              ${e.notes ? `<div style="font-size:13px;color:#555;margin-top:4px">${e.notes}</div>` : ''}
              <div class="card-meta"><span>🕐 ${fmtDate(e.event_time)}</span>${e.duration_min?`<span>⏱ ${e.duration_min}min</span>`:''}</div>
            </div>
            <button class="del-btn" onclick="deleteEvent(${e.id})">✕</button>
          </div>`).join('')}</div>`;
  }

  if (tab === 'settings') {
    content = `
      <div class="settings-card">
        <h3>🔌 Render Backend URL</h3>
        <div class="info-box">This is the only thing you need to set up. Get it from your Render dashboard.</div>
        <label class="label">Your Render URL</label>
        <input class="input" id="be" value="${BACKEND}" placeholder="https://juniper-xxxx.onrender.com"/>
        <div class="status"><span class="dot ${statusColor}"></span>${backendStatus === 'online' ? 'Connected ✓' : backendStatus === 'not set' ? 'Enter your URL above' : 'Not connected'}</div>
      </div>
      <div class="settings-card">
        <h3>🔔 Push Notifications (optional)</h3>
        <div class="info-box">Install the free <b>ntfy</b> app on your phone, subscribe to this topic, and get reminded before events.</div>
        <label class="label">ntfy topic (make up a secret name)</label>
        <input class="input" id="nt" value="${NTFY_TOPIC}" placeholder="juniper-yourname123"/>
      </div>
      <div class="settings-card">
        <h3>🔒 Your privacy</h3>
        <div class="info-box">All your todos, events and reminders are stored <b>only in this browser</b> on this device. Nothing is sent to any server except the audio transcript for AI processing. Each person who uses Juniper has their own completely private data.</div>
      </div>
      <button class="btn btn-green" onclick="saveSettings()">Save & Test Connection</button>
    `;
  }

  document.getElementById('app').innerHTML = `
    <div class="header">
      <h1>🌿 Juniper</h1>
      <p>Your private AI life assistant</p>
    </div>
    <div class="tabs">
      ${tabLabels.map(([id,lbl]) => `<button class="tab ${tab===id?'active':''}" onclick="setTab('${id}')">${lbl}</button>`).join('')}
    </div>
    ${content}
  `;
}

function setTab(t) { tab = t; render(); }

// ── Init ──────────────────────────────────────────────────────────────────────
rescheduleAll();
checkBackend();
setInterval(checkBackend, 30000);
render();
</script>
</body>
</html>
